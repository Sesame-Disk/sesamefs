services:
  sesamefs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SESAMEFS_HOST_PORT:-3000}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - SERVER_URL=${SERVER_URL}
      - CASSANDRA_HOSTS=${CASSANDRA_HOSTS:-cassandra:9042}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE:-sesamefs}
      - CASSANDRA_LOCAL_DC=${CASSANDRA_LOCAL_DC:-datacenter1}
      - AUTH_DEV_MODE=${AUTH_DEV_MODE:-true}
      - AUTH_ALLOW_ANONYMOUS=${AUTH_ALLOW_ANONYMOUS:-true}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URIS=${OIDC_REDIRECT_URIS}
      - OIDC_SESSION_TTL=${OIDC_SESSION_TTL:-24h}
      - OIDC_API_TOKEN_TTL=${OIDC_API_TOKEN_TTL:-4320h}
      - OIDC_AUTO_PROVISION=${OIDC_AUTO_PROVISION:-true}
      - OIDC_DEFAULT_ROLE=${OIDC_DEFAULT_ROLE:-user}
      - OIDC_REQUIRE_PKCE=${OIDC_REQUIRE_PKCE:-true}
      - OIDC_JWT_SIGNING_KEY=${OIDC_JWT_SIGNING_KEY}
      - OIDC_ROLES_CLAIM=${OIDC_ROLES_CLAIM}
      - OIDC_ORG_CLAIM=${OIDC_ORG_CLAIM}
      - OIDC_DEFAULT_ORG_ID=${OIDC_DEFAULT_ORG_ID}
      - OIDC_PLATFORM_ORG_ID=${OIDC_PLATFORM_ORG_ID}
      - OIDC_PLATFORM_ORG_CLAIM_VALUE=${OIDC_PLATFORM_ORG_CLAIM_VALUE}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_BUCKET=${S3_BUCKET:-sesamefs-blocks}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - SHARE_LINK_HMAC_KEY=${SHARE_LINK_HMAC_KEY:-dev-share-link-hmac-key}
      - FIRST_SUPERADMIN_EMAIL=${FIRST_SUPERADMIN_EMAIL}
    depends_on:
      cassandra:
        condition: service_healthy
      minio:
        condition: service_started
    # Config is baked into the image - no volume mount needed
    restart: unless-stopped

  cassandra:
    image: cassandra:5.0
    ports:
      - "${CASSANDRA_HOST_PORT:-9042}:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME:-sesamefs}
      - CASSANDRA_DC=${CASSANDRA_DC:-datacenter1}
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=${CASSANDRA_MAX_HEAP_SIZE:-512M}
      - HEAP_NEWSIZE=${CASSANDRA_HEAP_NEWSIZE:-100M}
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Elasticsearch REMOVED - Using Cassandra SASI for search instead
  # Saves 2GB RAM, search via /api/v2.1/search/ uses Cassandra indexes

  # MinIO for local S3-compatible storage (development)
  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"   # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Create buckets for multi-region simulation
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      echo 'Creating buckets for multi-region simulation...';
      mc mb myminio/sesamefs-blocks --ignore-existing;
      mc mb myminio/sesamefs-usa --ignore-existing;
      mc mb myminio/sesamefs-eu --ignore-existing;
      mc mb myminio/sesamefs-china --ignore-existing;
      mc mb myminio/sesamefs-archive --ignore-existing;
      mc anonymous set download myminio/sesamefs-blocks;
      mc anonymous set download myminio/sesamefs-usa;
      mc anonymous set download myminio/sesamefs-eu;
      mc anonymous set download myminio/sesamefs-china;
      echo 'Buckets created:';
      mc ls myminio;
      exit 0;
      "

  # OnlyOffice Document Server for document editing
  onlyoffice:
    image: onlyoffice/documentserver:latest
    ports:
      - "${ONLYOFFICE_HOST_PORT:-8088}:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-change-me-to-a-random-string}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  mobile-frontend:
    build:
      context: ./mobile-frontend
      dockerfile: Dockerfile
    ports:
      - "${MOBILE_FRONTEND_HOST_PORT:-5173}:80"
    environment:
      - API_URL=${API_URL:-http://sesamefs:8080}
    depends_on:
      - sesamefs
    restart: unless-stopped

  # NOTE: nginx frontend service REMOVED (2026-02-12)
  # The Go backend serves the SPA, static files, and API from a single port.
  # See sesamefs-pending-issues.txt "ARCHITECTURE DISCUSSION" for rationale.
  # To restore: uncomment and change sesamefs port back to 8082
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       - SESAMEFS_API_URL=${SESAMEFS_API_URL:-}
  #   ports:
  #     - "${FRONTEND_HOST_PORT:-3000}:80"
  #   depends_on:
  #     - sesamefs
  #   restart: unless-stopped

  # Seafile CLI for sync testing
  seafile-cli:
    build:
      context: ./docker/seafile-cli
      dockerfile: Dockerfile
    environment:
      - SEAF_SERVER_URL=${SEAF_CLI_SERVER_URL:-http://sesamefs:8080}
      - SEAF_USERNAME=${SEAF_CLI_USERNAME:-00000000-0000-0000-0000-000000000001}
      - SEAF_PASSWORD=${SEAF_CLI_PASSWORD:-dev-token-123}
    volumes:
      - seafile_cli_data:/seafile-data
      - seafile_cli_config:/home/seafuser/.ccnet
    depends_on:
      - sesamefs
    restart: unless-stopped
    profiles:
      - debug
    # Keep container running for interactive testing
    # Usage: docker compose --profile debug up seafile-cli
    # Then:  docker exec -it cool-storage-api-seafile-cli-1 seaf-test.sh help

  # Seafile CLI DEBUG container for protocol reverse engineering
  # Points to REAL Seafile server for protocol capture
  # IMPORTANT: Set SEAF_DEBUG_* variables in .env — never hardcode credentials here
  seafile-cli-debug:
    build:
      context: ./docker/seafile-cli-debug
      dockerfile: Dockerfile
    environment:
      - SEAF_SERVER_URL=${SEAF_DEBUG_SERVER_URL:-https://your-seafile-server.com}
      - SEAF_USERNAME=${SEAF_DEBUG_USERNAME:-your-email@example.com}
      - SEAF_PASSWORD=${SEAF_DEBUG_PASSWORD:-your-password}
    volumes:
      - seafile_debug_data:/seafile-data
      - seafile_debug_config:/home/seafuser/.ccnet
      - seafile_debug_captures:/captures
      - seafile_debug_mitmproxy:/mitmproxy
    restart: "no"
    profiles:
      - debug
    # Usage: docker compose --profile debug up seafile-cli-debug
    # Then:  docker exec -it cool-storage-api-seafile-cli-debug-1 seaf-debug.sh capture-all

volumes:
  cassandra_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  seafile_cli_data:
  seafile_cli_config:
  seafile_debug_data:
  seafile_debug_config:
  seafile_debug_captures:
  seafile_debug_mitmproxy:
