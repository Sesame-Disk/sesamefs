services:
  sesamefs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - SERVER_URL=http://localhost:8082
      - CASSANDRA_HOSTS=cassandra:9042
      - CASSANDRA_KEYSPACE=sesamefs
      - CASSANDRA_LOCAL_DC=datacenter1
      - AUTH_DEV_MODE=true
      - AUTH_ALLOW_ANONYMOUS=true
      - AWS_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=sesamefs-blocks
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      cassandra:
        condition: service_healthy
      minio:
        condition: service_started
    # Config is baked into the image - no volume mount needed
    restart: unless-stopped

  cassandra:
    image: cassandra:5.0
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=sesamefs
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Elasticsearch REMOVED - Using Cassandra SASI for search instead
  # Saves 2GB RAM, search via /api/v2.1/search/ uses Cassandra indexes

  # MinIO for local S3-compatible storage (development)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Create buckets for multi-region simulation
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      echo 'Creating buckets for multi-region simulation...';
      mc mb myminio/sesamefs-blocks --ignore-existing;
      mc mb myminio/sesamefs-usa --ignore-existing;
      mc mb myminio/sesamefs-eu --ignore-existing;
      mc mb myminio/sesamefs-china --ignore-existing;
      mc mb myminio/sesamefs-archive --ignore-existing;
      mc anonymous set download myminio/sesamefs-blocks;
      mc anonymous set download myminio/sesamefs-usa;
      mc anonymous set download myminio/sesamefs-eu;
      mc anonymous set download myminio/sesamefs-china;
      echo 'Buckets created:';
      mc ls myminio;
      exit 0;
      "

  # OnlyOffice Document Server for document editing
  onlyoffice:
    image: onlyoffice/documentserver:latest
    ports:
      - "8088:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=qzBQTRe5ThkVkl9zAR1vElLjNiDGtjn8
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # SesameFS Web UI (Seafile-compatible frontend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - SESAMEFS_API_URL=http://localhost:8082
    ports:
      - "3000:80"
    environment:
      - SESAMEFS_API_URL=http://localhost:8082
    depends_on:
      - sesamefs
    restart: unless-stopped

  # Seafile CLI for sync testing
  seafile-cli:
    build:
      context: ./docker/seafile-cli
      dockerfile: Dockerfile
    environment:
      - SEAF_SERVER_URL=http://sesamefs:8080
      - SEAF_USERNAME=00000000-0000-0000-0000-000000000001
      - SEAF_PASSWORD=dev-token-123
    volumes:
      - seafile_cli_data:/seafile-data
      - seafile_cli_config:/home/seafuser/.ccnet
    depends_on:
      - sesamefs
    restart: unless-stopped
    # Keep container running for interactive testing
    # Usage: docker exec -it cool-storage-api-seafile-cli-1 seaf-test.sh help

  # Seafile CLI DEBUG container for protocol reverse engineering
  # Points to REAL Seafile server for protocol capture
  seafile-cli-debug:
    build:
      context: ./docker/seafile-cli-debug
      dockerfile: Dockerfile
    environment:
      - SEAF_SERVER_URL=https://app.nihaoconsult.com
      - SEAF_USERNAME=abel.aguzmans@gmail.com
      - SEAF_PASSWORD=Qwerty123!
    volumes:
      - seafile_debug_data:/seafile-data
      - seafile_debug_config:/home/seafuser/.ccnet
      - seafile_debug_captures:/captures
      - seafile_debug_mitmproxy:/mitmproxy
    restart: "no"
    # Usage: docker exec -it cool-storage-api-seafile-cli-debug-1 seaf-debug.sh capture-all

volumes:
  cassandra_data:
  minio_data:
  onlyoffice_data:
  onlyoffice_logs:
  seafile_cli_data:
  seafile_cli_config:
  seafile_debug_data:
  seafile_debug_config:
  seafile_debug_captures:
  seafile_debug_mitmproxy:
