<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>SesameFS - System Admin</title>
  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png">
  <!-- Seahub Base Styles -->
  <link rel="stylesheet" href="%PUBLIC_URL%/static/css/seahub.css">
  <!-- Seafile Icon Fonts -->
  <link rel="stylesheet" href="%PUBLIC_URL%/static/css/sf_font2/seafile-font2.css">
  <link rel="stylesheet" href="%PUBLIC_URL%/static/css/sf_font3/iconfont.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="%PUBLIC_URL%/static/fontawesome/css/fontawesome-all.min.css">
</head>
<body>
  <div id="wrapper"></div>
  <div id="root"></div>
  <div id="modal-wrapper"></div>
  <!-- Runtime API URL injection - set SESAMEFS_API_URL env var only for dev mode (different ports) -->
  <!-- In production, leave unset to use window.location.origin automatically -->
  <script>
    // Only set if explicitly provided (e.g., via docker-entrypoint.sh or env var)
    // When undefined/empty, seafile-api.js uses window.location.origin
    window.SESAMEFS_API_URL = window.SESAMEFS_API_URL || '';
  </script>
  <script>
    // SesameFS configuration - replaces Django template injection
    // These values are read by src/utils/constants.js
    window.gettext = function(s) { return s; }; // i18n placeholder
    window.ngettext = function(s, p, n) { return n === 1 ? s : p; };

    window.app = {
      config: {
        siteRoot: '/',
        loginUrl: '/login/',
        serviceURL: window.SESAMEFS_API_URL || '',
        fileServerRoot: (window.SESAMEFS_API_URL || window.location.origin) + '/seafhttp/',
        mediaUrl: '/static/',

        // Branding
        siteTitle: 'Sesame Disk',
        siteName: 'Sesame Disk',
        logoPath: 'img/logo.png',
        faviconPath: '/favicon.png',
        logoWidth: 147,
        logoHeight: 64,
        loginBGPath: '',
        avatarInfo: { defaultUrl: '/static/img/default-avatar.png' },
        avatarURL: '/static/img/default-avatar.png',

        // Feature flags
        isPro: 'True',
        isDocs: 'False',
        isDBSqlite3: 'False',
        useGoFileserver: 'True',
        seafileVersion: '11.0.0',
        lang: 'en',
        enableRepoAutoDel: 'True',
      },

      pageOptions: {
        name: '',
        username: '',
        contactEmail: '',

        // Admin-specific: this is what makes sys-admin pages work
        isSystemStaff: true,
        canAddRepo: true,
        canShareRepo: true,
        canAddGroup: true,
        canGenerateShareLink: true,
        canGenerateUploadLink: true,
        canSendShareLinkEmail: false,
        canViewOrg: 'True',

        fileAuditEnabled: false,
        folderPermEnabled: false,
        enableResetEncryptedRepoPassword: 'False',
        isEmailConfigured: 'False',
        trashReposExpireDays: 30,
        seafileCollabServer: '',

        enableUploadFolder: 'True',
        enableResumableFileUpload: 'True',
        resumableUploadFileBlockSize: 8 * 1024 * 1024,
        maxUploadFileSize: null,
        maxNumberOfFilesForFileupload: 1000,

        storages: [],
        libraryTemplates: [],
        enableRepoSnapshotLabel: false,
        enableEncryptedLibrary: true,
        enableRepoHistorySetting: true,
        repoPasswordMinLength: 8,
        canAddPublicRepo: false,
        canPublishRepo: false,
        canInvitePeople: false,
        canLockUnlockFile: true,
        showLogoutIcon: true,

        shareLinkForceUsePassword: false,
        shareLinkPasswordMinLength: 8,
        shareLinkPasswordStrengthLevel: 1,
        shareLinkExpireDaysMin: 0,
        shareLinkExpireDaysMax: 0,
        shareLinkExpireDaysDefault: 0,
        uploadLinkExpireDaysMin: 0,
        uploadLinkExpireDaysMax: 0,
        uploadLinkExpireDaysDefault: 0,

        maxFileName: 255,
        thumbnailSizeForOriginal: 1024,
        customNavItems: [],
        sideNavFooterCustomHtml: '',
        aboutDialogCustomHtml: '',
        enableShowContactEmailWhenSearchUser: false,
        enableShowLoginIDWhenSearchUser: false,

        enableVideoThumbnail: false,
        enableOnlyoffice: true,
        onlyofficeConverterExtensions: ['doc', 'xls', 'ppt', 'odt', 'ods', 'odp'],
        enableSeafileAI: false,
        enableSSOToThirdpartWebsite: false,
        enableTC: false,
        enableSeaTableIntegration: false,
        canSetExProps: false,

        enableSubscription: false,
        additionalShareDialogNote: {},
        additionalAppBottomLinks: [],
        additionalAboutDialogLinks: [],
        enableShareToDepartment: false,
        enableSysAdminViewRepo: true,
        enableOCM: false,
        ocmRemoteServers: [],
        enableOCMViaWebdav: false,
        enableSeadoc: false,

        curNoteMsg: '',
        curNoteID: '',
      }
    };

    // Load runtime config if available (for Docker deployments)
    if (typeof window.SESAMEFS_CONFIG === 'object') {
      Object.assign(window.app.config, window.SESAMEFS_CONFIG);
    }

    // User identity - Go backend replaces at request time.
    window.app.pageOptions.username=window.__SESAME_USER_PLACEHOLDER__||"";

    // Sys-admin specific config (read by sys-admin components via window.sysadmin)
    window.sysadmin = {
      pageOptions: {
        // Feature flags
        constance_enabled: false,
        multi_tenancy: true,
        multi_institution: false,
        sysadmin_extra_enabled: false,
        enable_guest_invitation: false,
        enable_terms_and_conditions: false,
        is_default_admin: true,
        enable_file_scan: false,
        enable_work_weixin: false,
        enable_dingtalk: false,
        enableSysAdminViewRepo: true,
        haveLDAP: false,
        enable_share_link_report_abuse: false,
        twoFactorAuthEnabled: false,
        trashReposExpireDays: 30,
        availableRoles: ['user', 'admin', 'guest', 'readonly'],
        availableAdminRoles: ['superadmin'],
        institutions: [],

        // Admin permissions (superadmin has all)
        admin_permissions: {
          can_view_system_info: true,
          can_view_statistic: true,
          can_config_system: true,
          can_manage_library: true,
          can_manage_user: true,
          can_manage_group: true,
          can_view_user_log: true,
          can_view_admin_log: true,
          other_permission: true,
        }
      }
    };
  </script>
</body>
</html>
