server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Admin panel SPA - /sys/* routes serve sysadmin.html
    location /sys/ {
        try_files $uri $uri/ /sysadmin.html;
    }

    # Main app SPA routing - all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # File serving proxy - forwards /repo/ backend routes (raw file serving, history downloads)
    # MUST be before static assets rule to prevent .png/.jpg URLs being caught by static handler
    location ~ ^/repo/[^/]+/(raw|history)/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Share link view proxy - forwards /d/ paths to backend
    location /d/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Upload link view proxy - forwards /u/d/ paths to backend
    location /u/d/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File viewer proxy - forwards to backend for OnlyOffice and other file viewers
    location /lib/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # OnlyOffice callback proxy
    location /onlyoffice/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Office document conversion proxy
    location /office-convert/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API proxy - forwards to backend
    location /api2/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v2/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v2.1/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /seafhttp/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10G;
        proxy_request_buffering off;
    }

    # Accounts endpoints (logout, etc.) - proxy to backend
    location /accounts/ {
        proxy_pass http://sesamefs:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
