# =============================================================================
# SesameFS — Production Docker Compose
# =============================================================================
# Usage:
#   1. cp .env.prod.example .env
#   2. Fill in all values in .env
#   3. Get SSL cert: certbot certonly --standalone -d $DOMAIN -d $OFFICE_DOMAIN
#   4. docker compose -f docker-compose.prod.yml up -d --build
#
# All secrets come from .env — never hardcode values here.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # SesameFS API + Frontend
  # ---------------------------------------------------------------------------
  sesamefs:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"                      # Reachable as sesamefs:8080 on sfs-net
    networks:
      - sfs-net
      - internal
    env_file:
      - .env                        # All secrets from .env
    environment:
      # Computed from DOMAIN (docker-compose interpolates from .env)
      # - SERVER_URL=https://${DOMAIN}
      - OIDC_REDIRECT_URIS=https://${DOMAIN}/sso/,https://${DOMAIN}/oauth/callback/
      - ONLYOFFICE_API_JS_URL=https://${OFFICE_DOMAIN}/web-apps/apps/api/documents/api.js

      # Cassandra — defaults work for single-region; override in .env for multi-region
      - CASSANDRA_HOSTS=${CASSANDRA_HOSTS:-cassandra:9042}
      - CASSANDRA_KEYSPACE=${CASSANDRA_KEYSPACE:-sesamefs}
      - CASSANDRA_LOCAL_DC=${CASSANDRA_LOCAL_DC:-datacenter1}

      # Region — leave empty for single-region; set to usa/eu/asia in multi-region
      - SERVER_REGION=${SERVER_REGION:-}

      # Force production mode (overrides any accidental dev values in .env)
      - AUTH_DEV_MODE=false
      - AUTH_ALLOW_ANONYMOUS=false
      - OIDC_ENABLED=true
      - ONLYOFFICE_ENABLED=true
      - METRICS_ENABLED=true
    volumes:
      # Mount prod config over the config baked into the Docker image.
      # This config has structural settings; all secrets come from env vars.
      - ./config.prod.yaml:/app/config.yaml:ro
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Cassandra Database
  # ---------------------------------------------------------------------------
  # Single-region: runs on internal Docker network only (default).
  # Multi-region:  set CASSANDRA_BIND_IP to the private/vRack IP so other
  #                nodes can reach gossip (7000/7001) and CQL (9042) ports.
  #                Ports are NEVER exposed on 0.0.0.0 — only on the bind IP.
  # ---------------------------------------------------------------------------
  cassandra:
    image: cassandra:5.0
    expose:
      - "9042"                      # Internal only — sesamefs reaches via 'internal' network
    ports:
      # Multi-region: bind to private IP for inter-node gossip and CQL.
      # Single-region: defaults to 127.0.0.1 (localhost only, not reachable externally).
      - "${CASSANDRA_BIND_IP:-127.0.0.1}:7000:7000"    # Gossip inter-node
      - "${CASSANDRA_BIND_IP:-127.0.0.1}:7001:7001"    # Gossip TLS
      - "${CASSANDRA_BIND_IP:-127.0.0.1}:9042:9042"    # CQL native
    networks:
      - internal
    env_file:
      - .env                        # Multi-region vars (CASSANDRA_SEEDS, etc.) come from here
    environment:
      # Always-required settings (with sensible defaults)
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME}
      - CASSANDRA_DC=${CASSANDRA_DC:-datacenter1}
      - CASSANDRA_RACK=${CASSANDRA_RACK:-rack1}
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=${CASSANDRA_MAX_HEAP_SIZE}
      - HEAP_NEWSIZE=${CASSANDRA_HEAP_NEWSIZE}
      # Multi-region vars (CASSANDRA_SEEDS, CASSANDRA_BROADCAST_ADDRESS,
      # CASSANDRA_RPC_ADDRESS, CASSANDRA_BROADCAST_RPC_ADDRESS) are passed
      # via env_file above. Do NOT set CASSANDRA_LISTEN_ADDRESS (auto-detect).
      # When commented out in .env → not set → Cassandra uses its defaults.
      # When uncommented in .env → passed to container → multi-region works.
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # OnlyOffice Document Server
  # ---------------------------------------------------------------------------
  onlyoffice:
    image: onlyoffice/documentserver:latest
    expose:
      - "80"                        # Reachable as onlyoffice:80 on sfs-net
    networks:
      - sfs-net
      - internal
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (SSL termination) — OPTIONAL
  # ---------------------------------------------------------------------------
  # Uncomment if you want nginx bundled in this stack (standalone deploy).
  # If you have an existing nginx proxy (e.g. shared across multiple services),
  # leave this commented and connect it to sfs-net instead.
  # See nginx/nginx.conf.template for the proxy config.
  #
  # nginx:
  #   image: nginx:stable-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   networks:
  #     - sfs-net
  #   environment:
  #     - DOMAIN=${DOMAIN}
  #     - OFFICE_DOMAIN=${OFFICE_DOMAIN}
  #   volumes:
  #     - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - sesamefs
  #     - onlyoffice
  #   restart: unless-stopped

networks:
  sfs-net:
    external: true        # Create once: docker network create sfs-net
  internal:
    # Not marked 'internal: true' — Cassandra needs outbound routing for
    # multi-region gossip. Security is enforced by binding ports only to
    # CASSANDRA_BIND_IP (private IP), never 0.0.0.0.

volumes:
  cassandra_data:
  onlyoffice_data:
  onlyoffice_logs:
