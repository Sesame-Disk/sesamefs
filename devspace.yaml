# DevSpace Configuration - Attach to Existing Pod (Secondary Sessions)
# Use this for additional project directories connecting to the SAME pod
#
# IMPORTANT DIFFERENCES from devspace-project.yaml:
# 1. NO port forwarding (avoids conflicts with primary session)
# 2. Syncs to a different path: /workspace/cool-storage-api
# 3. NO terminal/logs (use tmux in primary session)
# 4. Lightweight - just file sync
#
# USAGE:
#   Primary session (first project):
#     cd ~/code/project1
#     cp devspace-project.yaml devspace.yaml
#     devspace dev  # Has port forwarding, terminal, logs
#
#   Secondary sessions (additional projects):
#     cd ~/code/project2
#     cp devspace-attach.yaml devspace.yaml
#     devspace dev  # Just file sync, no ports
#
#     cd ~/code/project3
#     cp devspace-attach.yaml devspace.yaml
#     devspace dev  # Just file sync, no ports
#
# All connect to the SAME pod, each syncing different directories!

version: v2beta1
# Dynamic name based on project directory - makes each session unique
name: ai-workspace-attach-cool-storage-api

# Pipelines - only dev mode (no deploy)
pipelines:
  dev:
    run: |-
      start_dev workspace

# Variables - auto-detected with smart defaults
vars:
  ENGINEER_NAME:
    source: env

  # Auto-detect project name from current directory
  # This is used in the name above to make each session unique
  PROJECT_NAME:
    source: command
    command: "bash"
    args:
      - "-c"
      - "basename $(pwd)"

# Development mode - connect to existing pod (sync only, no ports)
dev:
  workspace:
    # Find pods created by deployment (same pod as primary session)
    labelSelector:
      app: ${ENGINEER_NAME}-poc
    namespace: engineer-${ENGINEER_NAME}
    container: ${ENGINEER_NAME}-poc

    # Bidirectional file sync - syncs current directory to workspace
    sync:
      - path: .:/workspace/cool-storage-api
        disableDownload: false
        disableUpload: false

        # IMPORTANT: On initial sync, prefer local files
        # This prevents stale pod files from overwriting fresh git pulls
        initialSync: preferRemote

        # Fix permissions after upload
        onUpload:
          execRemote:
            command: "bash"
            args:
              - "-c"
              - "chown -R developer:developer /workspace/cool-storage-api 2>/dev/null || true"

        # Files to exclude from upload
        uploadExcludePaths:
          - .git/
          - .devspace/
          - node_modules/
          - __pycache__/
          - "*.pyc"
          - .pytest_cache/
          - .next/
          - .nuxt/
          - dist/
          - build/
          - .venv/
          - venv/
          - "*.log"
          - .DS_Store
          - coverage/
          - .vscode/
          - .idea/
          # SECURITY: Exclude sensitive files
          - .env
          - .env.*
          - "*.pem"
          - "*.key"
          - "*.p12"
          - "*.pfx"
          - .aws/credentials
          - .aws/config
          - .ssh/id_*
          - .ssh/*_rsa
          - .kube/config
          - "*.crt"
          - "*.cer"

        # Files to exclude from download
        downloadExcludePaths:
          - .git/
          - node_modules/
          - __pycache__/
          - .pytest_cache/
          - .next/
          - .nuxt/
          - .venv/
          - venv/

    # NO port forwarding - avoids conflicts with primary session
    # Use the primary session's ports for all projects

    # NO terminal - use tmux in primary session to access all projects
    terminal:
      enabled: false

    # NO logs - check logs in primary session
    logs:
      enabled: false
