{{define "title"}}{{.Filename}} (historic) - SesameFS{{end}}
{{define "body-attrs"}} class="preview-layout"{{end}}
{{define "body"}}
    <div class="page-header">
        <div class="page-header-left">
            <img src="/static/img/logo.png" alt="SesameFS" class="logo" onerror="this.style.display='none'">
            <div class="file-info">
                <span class="file-name">{{.Filename}}</span>
                <span class="file-badge">Historic Version</span>
            </div>
        </div>
        <div class="page-header-right">
            <a href="{{.DownloadURL}}" class="btn-primary btn">Download</a>
        </div>
    </div>
    <div class="preview-container">
        {{.PreviewContent}}
    </div>
{{end}}
