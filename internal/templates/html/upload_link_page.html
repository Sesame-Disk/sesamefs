{{define "title"}}{{.Title}}{{end}}
{{define "head"}}
{{range .CSSLinks}}    <link rel="stylesheet" href="{{.}}">
{{end}}{{end}}
{{define "body"}}
    <div id="wrapper"></div>
    <div id="modal-wrapper"></div>

    <script>
    window.gettext = function(s) { return s; };
    window.ngettext = function(s, p, n) { return n === 1 ? s : p; };
    window.pgettext = function(c, s) { return s; };
    window.interpolate = function(fmt, obj, named) {
        if (named) {
            return fmt.replace(/%\((\w+)\)s/g, function(m, k) { return obj[k] !== undefined ? obj[k] : m; });
        }
        return fmt.replace(/%s/g, function() { return obj.shift(); });
    };

    window.app = window.app || {};
    window.app.config = {
        serviceURL: "",
        mediaUrl: "/static/",
        siteRoot: "/",
        staticUrl: "/static/",
        logoPath: "img/logo.png",
        logoWidth: 128,
        logoHeight: 40,
        siteTitle: "SesameFS",
        fileServerRoot: "/seafhttp/",
        useGoFileserver: true,
        lang: "en"
    };
    window.app.pageOptions = {
        name: "",
        username: "",
        contactEmail: ""
    };
    window.uploadLink = {{.PageOptionsJSON}};
    </script>

{{range .ScriptTags}}    <script src="{{.}}"></script>
{{end}}{{end}}
