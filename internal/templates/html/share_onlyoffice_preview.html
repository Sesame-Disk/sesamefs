{{define "title"}}{{.Filename}} - SesameFS{{end}}
{{define "body-attrs"}} class="preview-layout"{{end}}
{{define "body"}}
    <div class="page-header">
        <div class="page-header-left">
            <a href="/"><img src="/static/img/logo.png" alt="SesameFS" class="logo" onerror="this.style.display='none'" /></a>
            <div class="file-info">
                <div class="file-name" title="{{.Filename}}">{{.Filename}}</div>
                <div class="shared-by">Shared by {{.SharedBy}}</div>
            </div>
        </div>
        <div class="page-header-right">
            {{.DownloadBtn}}
        </div>
    </div>
    <div class="preview-container" id="oo-preview">
        <div class="loading">
            <div class="loading-spinner"></div>
            <span>Loading document preview...</span>
        </div>
    </div>

    <script src="{{.APIJSURL}}"></script>
    <script>
        (function() {
            var config = {{.ConfigJSON}};

            function initEditor() {
                if (typeof DocsAPI === 'undefined') {
                    setTimeout(initEditor, 100);
                    return;
                }
                try {
                    document.getElementById('oo-preview').innerHTML = '';
                    new DocsAPI.DocEditor("oo-preview", config);
                } catch (e) {
                    console.error('Failed to initialize document preview:', e);
                    document.getElementById('oo-preview').innerHTML =
                        '<div class="editor-error"><h2>Preview unavailable</h2><p>' + e.message + '</p></div>';
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initEditor);
            } else {
                initEditor();
            }
        })();
    </script>
{{end}}
